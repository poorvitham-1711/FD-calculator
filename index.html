<html>
<head>
    <title>FD Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>FD Calculator</h2>
    <!-- Interest Slider -->
    <div class="slider-box">
        <label>Interest Rate (%)</label>
        <input type="range" id="interest" min="0" max="15" step="0.1" value="0">
        <div class="values">
            <span>0%</span>
            <span>15%</span>
        </div>
    </div>
    <!-- Amount Slider -->
    <div class="slider-box">
        <label>Amount (₹)</label>
        <input type="range" id="amount" min="3000" max="100000" step="1000" value="3000">
        <div class="values">
            <span>₹3,000</span>
            <span>₹1,00,000</span>
        </div>
    </div>
    <!-- Duration Slider -->
    <div class="slider-box">
        <label>Duration (Years)</label>
        <input type="range" id="duration" min="0.25" max="15" step="0.25" value="0.25">
        <div class="values">
            <span>3 Months</span>
            <span>15 Years</span>
        </div>
    </div>
    <button onclick="submitValues()">Submit</button>
    <!-- Display Box -->
    <div id="displayBox" class="display-box"></div>
    <button onclick="calculateFD()">Calculate Amount</button>
    <!-- Result -->
    <div id="result" class="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
